name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Create 404.html for SPA routing
        run: |
          cat > dist/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <title>Redirecting...</title>
              <script>
                var pathSegmentsToKeep = 0;
                var l = window.location;
                l.replace(
                  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                  l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
                  l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
                  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                  l.hash
                );
              </script>
            </head>
            <body>
              <p>Redirecionando...</p>
            </body>
          </html>
          EOF
          
      - name: Create .nojekyll
        run: touch dist/.nojekyll
        
      - name: Copy CNAME to dist
        run: cp public/CNAME dist/CNAME
        
      - name: Copy 404.html to dist
        run: cp dist/index.html dist/404.html
        
      - name: Copy sitemap to dist
        run: cp public/sitemap.xml dist/sitemap.xml

      - name: Create static route stubs for SEO (HTTP 200 on SPA routes)
        run: |
          ROUTES=(
            "en"
            "pt"
            "en/solutions"
            "pt/solutions"
            "en/success-stories"
            "pt/success-stories"
            "en/contact"
            "pt/contact"
            "en/privacy-policy"
            "pt/privacy-policy"
            "en/ethics-policy"
            "pt/ethics-policy"
            "en/insights"
            "pt/insights"
            "en/insights/previsao-demanda-ia"
            "pt/insights/previsao-demanda-ia"
            "en/success-stories/marketplace-excellence-pharmacy"
            "pt/success-stories/marketplace-excellence-pharmacy"
            "en/success-stories/customer-engagement-online-sales"
            "pt/success-stories/customer-engagement-online-sales"
            "en/success-stories/assortment-precision-sales-growth"
            "pt/success-stories/assortment-precision-sales-growth"
            "en/success-stories/sales-forecast-precision"
            "pt/success-stories/sales-forecast-precision"
            "en/success-stories/cross-sell-propensity-intelligence"
            "pt/success-stories/cross-sell-propensity-intelligence"
            "en/success-stories/demand-forecast-accuracy"
            "pt/success-stories/demand-forecast-accuracy"
          )
          for route in "${ROUTES[@]}"; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done
          echo "Created stubs for ${#ROUTES[@]} routes"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
